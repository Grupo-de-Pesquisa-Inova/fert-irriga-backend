# Listener MQTT TCP (protocolo padrão)
listener 1883
protocol mqtt

# Listener WebSocket (para debug com clientes web)
listener 9001
protocol websockets

# Autenticação (desabilitada para dev — habilitar em produção)
allow_anonymous true

# Persistência
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type all
connection_messages true
