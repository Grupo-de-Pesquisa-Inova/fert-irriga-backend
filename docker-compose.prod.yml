# ════════════════════════════════════════════════════════════
# Stack de PRODUÇÃO — Dokploy (Compose)
# ════════════════════════════════════════════════════════════

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fertirriga
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: fertirriga
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fertirriga"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [fertirriga]

  mosquitto-init:
    image: eclipse-mosquitto:2
    entrypoint: /bin/sh
    command:
      - -c
      - |
        if [ ! -f /mosquitto/passwd/passwd ]; then
          mkdir -p /mosquitto/passwd
          mosquitto_passwd -c -b /mosquitto/passwd/passwd ${MQTT_USERNAME} ${MQTT_PASSWORD}
          echo "Arquivo de senhas MQTT criado com sucesso"
        else
          echo "Arquivo de senhas MQTT ja existe, pulando..."
        fi
    volumes:
      - mosquitto_passwd:/mosquitto/passwd
    networks: [fertirriga]

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    depends_on:
      mosquitto-init:
        condition: service_completed_successfully
    volumes:
      - ./docker/mosquitto/mosquitto.prod.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_passwd:/mosquitto/passwd
      - mosquitto_data:/mosquitto/data
    networks: [fertirriga]

  backend:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
    environment:
      APP_ENV: production
      PORT: "8080"
      DATABASE_URL: postgres://fertirriga:${POSTGRES_PASSWORD}@postgres:5432/fertirriga?sslmode=disable
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      MQTT_CLIENT_ID: fertirriga-backend
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      CORS_ORIGIN: ${CORS_ORIGIN}
    ports:
      - "8080:8080"
    networks: [fertirriga]

volumes:
  pgdata:
  mosquitto_data:
  mosquitto_passwd:

networks:
  fertirriga:
