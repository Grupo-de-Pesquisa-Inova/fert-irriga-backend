# ════════════════════════════════════════════════════════════
# Stack de PRODUÇÃO — Dokploy (Compose)
# ════════════════════════════════════════════════════════════

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fertirriga
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: fertirriga
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fertirriga"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [fertirriga]

  mosquitto-init:
    image: eclipse-mosquitto:2
    entrypoint: /bin/sh
    command:
      - -c
      - |
        # Gerar mosquitto.conf
        cat > /mosquitto/config/mosquitto.conf <<'EOF'
        allow_anonymous false
        password_file /mosquitto/config/passwd
        listener 1883
        protocol mqtt
        persistence true
        persistence_location /mosquitto/data/
        log_dest stdout
        log_type warning
        log_type error
        connection_messages true
        EOF

        # Gerar arquivo de senhas
        mosquitto_passwd -c -b /mosquitto/config/passwd ${MQTT_USERNAME} ${MQTT_PASSWORD}
        echo "Mosquitto configurado com sucesso"
    volumes:
      - mosquitto_config:/mosquitto/config
    networks: [fertirriga]

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    depends_on:
      mosquitto-init:
        condition: service_completed_successfully
    volumes:
      - mosquitto_config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
    networks: [fertirriga]

  backend:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
    environment:
      APP_ENV: production
      PORT: "8080"
      DATABASE_URL: postgres://fertirriga:${POSTGRES_PASSWORD}@postgres:5432/fertirriga?sslmode=disable
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      MQTT_CLIENT_ID: fertirriga-backend
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      CORS_ORIGIN: ${CORS_ORIGIN}
    ports:
      - "8080:8080"
    networks: [fertirriga]

volumes:
  pgdata:
  mosquitto_data:
  mosquitto_config:

networks:
  fertirriga:
