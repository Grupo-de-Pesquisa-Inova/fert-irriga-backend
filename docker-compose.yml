services:
  postgres:
    image: postgres:16-alpine
    container_name: fertirriga-db
    environment:
      POSTGRES_USER: fertirriga
      POSTGRES_PASSWORD: fertirriga
      POSTGRES_DB: fertirriga
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fertirriga"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: fertirriga-mqtt
    ports:
      - "1883:1883"
      - "9003:9001"
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped

volumes:
  pgdata:
  mosquitto_data:
  mosquitto_log:
